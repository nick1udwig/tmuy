name: ci

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  prepare-release:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
      sha: ${{ steps.bump.outputs.sha }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Bump patch version
        id: bump
        shell: bash
        run: |
          version="$(./scripts/bump-version.sh)"
          tag="v${version}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          git commit -m "release: ${tag} [skip ci]"
          git push origin HEAD:${GITHUB_REF_NAME}

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "sha=$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"

  test:
    needs: prepare-release
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare-release.outputs.sha }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target
          key: cargo-test-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-test-${{ runner.os }}-

      - name: Install Linux sandbox dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes bubblewrap

      - name: Smoke test release installer
        run: bash tests/install-script.sh

      - name: Smoke test version bump script
        run: bash tests/bump-version.sh

      - name: Format check
        run: cargo fmt --check

      - name: Test
        run: cargo test --locked

  build:
    needs:
      - prepare-release
      - test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-14
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare-release.outputs.sha }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target
          key: cargo-build-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-build-${{ runner.os }}-${{ matrix.target }}-

      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Package release archive
        run: ./scripts/package-release.sh ${{ needs.prepare-release.outputs.version }} ${{ matrix.target }} target/${{ matrix.target }}/release/tmuy

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: tmuy-${{ matrix.target }}
          path: dist/*
          retention-days: 14

  publish-release:
    needs:
      - prepare-release
      - build
    runs-on: ubuntu-24.04
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist
          pattern: tmuy-*
          merge-multiple: true

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
          RELEASE_SHA: ${{ needs.prepare-release.outputs.sha }}
          RELEASE_REPO: ${{ github.repository }}
        run: |
          if gh release view "${RELEASE_TAG}" --repo "${RELEASE_REPO}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" dist/* --repo "${RELEASE_REPO}" --clobber
          else
            gh release create "${RELEASE_TAG}" dist/* \
              --repo "${RELEASE_REPO}" \
              --target "${RELEASE_SHA}" \
              --title "${RELEASE_TAG}" \
              --notes "Automated release for ${RELEASE_TAG}"
          fi
